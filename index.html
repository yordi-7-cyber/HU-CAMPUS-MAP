<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background slideshow -->
  <div class="slideshow" id="slideshow">
    <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1920&q=80')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1920&q=80')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=1920&q=80')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=1920&q=80')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=1920&q=80')"></div>
  </div>

  <!-- Overlay -->
  <div class="overlay"></div>

  <!-- Top bar -->
  <header class="topbar">
    <div class="logo" data-i18n="appName">Wanderlust</div>
    <div class="topbar-right">
      <!-- Language selector -->
      <div class="lang-selector" id="langSelector">
        <button class="lang-btn" id="langToggle" aria-label="Select language">
          <span class="lang-icon">🌐</span>
          <span id="currentLang">EN</span>
          <span class="chevron">▾</span>
        </button>
        <ul class="lang-dropdown" id="langDropdown" role="listbox">
          <li data-lang="en" class="active" role="option">English</li>
          <li data-lang="am" role="option">አማርኛ</li>
          <li data-lang="om" role="option">Afaan Oromoo</li>
          <li data-lang="so" role="option">Soomaali</li>
        </ul>
      </div>
      <!-- Theme toggle -->
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="theme-icon" id="themeIcon">☀️</span>
      </button>
    </div>
  </header>

  <!-- Main card -->
  <main class="main">
    <div class="card">
      <p class="tagline" data-i18n="tagline">Discover the world</p>
      <h1 class="title" data-i18n="title">Welcome Back</h1>
      <p class="subtitle" data-i18n="subtitle">Sign in to continue your journey</p>

      <div class="actions">
        <button class="btn btn-primary" data-i18n="signin">Sign In</button>
        <div class="divider"><span data-i18n="or">or</span></div>
        <button class="btn btn-ghost" data-i18n="guest">Continue as Guest</button>
      </div>

      <p class="signup-hint">
        <span data-i18n="noAccount">Don't have an account?</span>
        <a href="#" data-i18n="createOne">Create one</a>
      </p>
    </div>
  </main>

  <!-- Slide indicators -->
  <div class="indicators" id="indicators"></div>

  <script src="app.js"></script>
</body>
</html>
