<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HU Wanderlust</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background slideshow -->
  <div class="slideshow" id="slideshow">
    <!-- Students studying together outdoors on campus -->
    <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=1920&q=85')"></div>
    <!-- Students walking across campus with backpacks -->
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=1920&q=85')"></div>
    <!-- University library / students reading -->
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1497633762265-9d179a990aa6?w=1920&q=85')"></div>
    <!-- Students laughing on campus lawn -->
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1529390079861-591de354faf5?w=1920&q=85')"></div>
    <!-- Lecture hall / classroom energy -->
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=1920&q=85')"></div>
    <!-- Campus architecture + students -->
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1562774053-701939374585?w=1920&q=85')"></div>
  </div>

  <!-- Overlay -->
  <div class="overlay"></div>

  <!-- Top bar -->
  <header class="topbar">
    <div class="logo"><span class="logo-hu">HU</span> <span data-i18n="appName">Wanderlust</span></div>
    <div class="topbar-right">
      <!-- Language selector -->
      <div class="lang-selector" id="langSelector">
        <button class="lang-btn" id="langToggle" aria-label="Select language">
          <span class="lang-icon">🌐</span>
          <span id="currentLang">EN</span>
          <span class="chevron">▾</span>
        </button>
        <ul class="lang-dropdown" id="langDropdown" role="listbox">
          <li data-lang="en" class="active" role="option">English</li>
          <li data-lang="am" role="option">አማርኛ</li>
          <li data-lang="om" role="option">Afaan Oromoo</li>
          <li data-lang="so" role="option">Soomaali</li>
        </ul>
      </div>
      <!-- Theme toggle -->
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="theme-icon" id="themeIcon">☀️</span>
      </button>
    </div>
  </header>

  <!-- Main card -->
  <main class="main">
    <div class="card">
      <p class="tagline" data-i18n="tagline">Haramaya University</p>
      <h1 class="title" data-i18n="title">Welcome Back</h1>
      <p class="subtitle" data-i18n="subtitle">Explore your campus, find your way</p>
      <p class="slogan" data-i18n="slogan">No more afraid to go somewhere.</p>

      <div class="actions">
        <button class="btn btn-primary" data-i18n="signin">Sign In</button>
        <div class="divider"><span data-i18n="or">or</span></div>
        <button class="btn btn-ghost" data-i18n="guest">Continue as Guest</button>
      </div>

      <p class="signup-hint">
        <span data-i18n="noAccount">Don't have an account?</span>
        <a href="#" data-i18n="createOne">Create one</a>
      </p>
    </div>
  </main>

  <!-- Slide indicators -->
  <div class="indicators" id="indicators"></div>

  <script src="app.js"></script>
</body>
</html>
